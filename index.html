<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rezervacijos</title>

<style>
body {
    font-family: Arial;
    padding: 10px;
    background: #f5f5f5;
}

/* forma */
.controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 15px;
}

input, select, button {
    padding: 8px;
    font-size: 14px;
}

/* kalendorius */
.month {
    margin-bottom: 30px;
}

.month h2 {
    margin-bottom: 10px;
}

.calendar {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
}

.day {
    background: #fff;
    border-radius: 6px;
    padding: 5px;
    min-height: 60px;
    font-size: 12px;
}

.busy {
    background: #ffb3b3;
}

.day small {
    display: block;
    font-size: 11px;
}

/* lentelė */
table {
    width: 100%;
    background: #fff;
    border-collapse: collapse;
    margin-bottom: 20px;
}

th, td {
    padding: 8px;
    border-bottom: 1px solid #ddd;
    text-align: left;
}

.delete {
    cursor: pointer;
    background: red;
    color: white;
    border: none;
}

/* MOBILE */
@media (max-width: 600px) {
    .calendar {
        grid-template-columns: repeat(2, 1fr);
    }
}
</style>

</head>
<body>

<h2>Rezervacijų valdymas</h2>

<div class="controls">
    <select id="auto">
        <option>BMW 520</option>
        <option>Ford Focus</option>
    </select>

    <input type="date" id="from">
    <input type="date" id="to">
    <input type="text" id="client" placeholder="Klientas">
    <input type="number" id="price" placeholder="€/diena">
    <button onclick="add()">Pridėti</button>
</div>

<table>
<thead>
<tr>
    <th>Auto</th>
    <th>Nuo</th>
    <th>Iki</th>
    <th>Klientas</th>
    <th>Dienos</th>
    <th>Suma €</th>
    <th></th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

<h3>Klientų suma</h3>
<div id="clients"></div>

<div id="calendar"></div>

<script>
let data = JSON.parse(localStorage.getItem("rez") || "[]");

function daysBetween(a, b) {
    return Math.ceil((new Date(b) - new Date(a)) / (1000*60*60*24)) + 1;
}

function add() {
    let obj = {
        auto: auto.value,
        from: from.value,
        to: to.value,
        client: client.value,
        price: Number(price.value)
    };

    data.push(obj);
    save();
}

function del(i) {
    data.splice(i,1);
    save();
}

function save() {
    localStorage.setItem("rez", JSON.stringify(data));
    render();
}

function render() {
    let listHTML = "";
    let clientsSum = {};

    data.forEach((r,i)=>{
        let days = daysBetween(r.from, r.to);
        let sum = days * (r.price || 0);

        clientsSum[r.client] = (clientsSum[r.client] || 0) + sum;

        listHTML += `
        <tr>
            <td>${r.auto}</td>
            <td>${r.from}</td>
            <td>${r.to}</td>
            <td>${r.client}</td>
            <td>${days}</td>
            <td>${sum} €</td>
            <td><button class="delete" onclick="del(${i})">X</button></td>
        </tr>`;
    });

    list.innerHTML = listHTML;

    let clientHTML = "";
    for(let c in clientsSum){
        clientHTML += `<div>${c}: ${clientsSum[c]} €</div>`;
    }
    clients.innerHTML = clientHTML;

    renderCalendar();
}

function renderCalendar() {
    let cal = "";

    let year = new Date().getFullYear();

    for(let m=0;m<12;m++){
        let date = new Date(year, m, 1);
        let monthName = date.toLocaleString('lt', {month:'long'});

        cal += `<div class="month"><h2>${monthName} ${year}</h2><div class="calendar">`;

        while(date.getMonth()===m){
            let dStr = date.toISOString().split('T')[0];

            let matches = data.filter(r=>{
                return dStr >= r.from && dStr <= r.to;
            });

            let cls = matches.length ? "day busy" : "day";

            cal += `<div class="${cls}">
                ${dStr}
                ${matches.map(r=>`<small>${r.auto}</small>`).join("")}
            </div>`;

            date.setDate(date.getDate()+1);
        }

        cal += "</div></div>";
    }

    calendar.innerHTML = cal;
}

render();
</script>

</body>
</html>
